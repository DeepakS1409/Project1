<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In | DeepKart</title>


    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <!-- Login CSS -->

    <link rel="stylesheet" href="css/login.css">


</head>


<body>


    <div class="signin-container">


        <!-- LEFT SECTION -->

        <div class="signin-left">


            <div class="brand">

                <i class="fa-solid fa-cart-shopping"></i>

                <h1>DeepKart</h1>

            </div>


            <h2>
                Welcome Back!
            </h2>


            <p>
                Login to continue shopping with DeepKart. Discover quality products and enjoy a smooth shopping experience.
            </p>


            <img src="images/login.png" alt="Login Illustration">


        </div>





        <!-- RIGHT SECTION -->

        <div class="signin-right">


            <form id="signinForm">


                <h2>
                    Sign In
                </h2>


                <p class="subtitle">
                    Enter your account details to continue
                </p>





                <!-- Email -->

                <div class="input-group">


                    <label>
                    Email Address
                </label>


                    <input type="email" id="signinEmail" placeholder="Enter your email" required>


                </div>





                <!-- Password -->

                <div class="input-group password-box">


                    <label>
                    Password
                </label>


                    <input type="password" id="signinPassword" placeholder="Enter your password" required>


                    <span id="toggleSigninPassword">
                    👁
                </span>


                </div>





                <!-- Remember -->

                <div class="remember">


                    <label>

                    <input type="checkbox" id="rememberMe">

                    Remember me

                </label>


                    <a href="#">
                    Forgot Password?
                </a>


                </div>






                <!-- Button -->

                <button class="signin-btn" type="submit">

                Sign In

            </button>





                <!-- Message -->

                <p id="signinMessage"></p>






                <!-- Signup Link -->

                <p class="signup-link">

                    Don't have an account?

                    <a href="signup.html">
                    Create Account
                </a>


                </p>




            </form>


        </div>


    </div>





    <script src="js/auth.js"></script>


</body>

</html>
