<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details | DeepKart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product-details.css">

</head>

<body>

    <header>

        <a href="index.html" class="logo">

            <i class="fa-solid fa-store"></i>

            <h2>DeepKart</h2>

        </a>
        <div class="search-box">

            <input id="productSearch" type="text" placeholder="Search Products">

            <button>

            <i class="fa-solid fa-search"></i>

        </button>

        </div>

        <div class="header-icons">

            <a href="wishlist.html" class="icon-btn">

                <i class="fa-solid fa-heart"></i> Wishlist

                <span class="wishlist-count">0</span>

            </a>

            <a href="cart.html" class="icon-btn">

                <i class="fa-solid fa-cart-shopping"></i> Cart

                <span class="cart-count">0</span>

            </a>

            <div class="profile">

                <button id="profileBtn">

            <i class="fa-solid fa-user"></i>

        </button>

                <div class="dropdown">

                    <a href="login.html">

                        <i class="fa-solid fa-right-to-bracket"></i> Login

                    </a>

                    <a href="signup.html">

                        <i class="fa-solid fa-user-plus"></i> Sign Up

                    </a>

                    <a href="profile.html">

                        <i class="fa-solid fa-user"></i> My Profile

                    </a>

                    <a href="orders.html">

                        <i class="fa-solid fa-box"></i> Orders

                    </a>

                    <a href="wishlist.html">

                        <i class="fa-solid fa-heart"></i> Wishlist

                    </a>

                    <a href="#" id="logoutBtn">

                        <i class="fa-solid fa-right-from-bracket"></i> Logout

                    </a>

                </div>

            </div>

        </div>

    </header>

    <section class="product-page">

        <!-- LEFT SIDE -->

        <div class="product-gallery">

            <div class="thumbnail-list">

                <img id="thumb1" class="thumb active" alt="Thumbnail 1">

                <img id="thumb2" class="thumb">

                <img id="thumb3" class="thumb">

                <img id="thumb4" class="thumb">

            </div>

            <div class="main-image">

                <img id="mainImage" alt="Product Image">

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="product-details">

            <span id="category" class="category"></span>

            <h1 id="productName"></h1>

            <div class="rating">

                ⭐⭐⭐⭐⭐

                <span id="rating"></span>

            </div>

            <div class="price-section">

                <div class="current-price">

                    ₹<span id="price"></span>

                </div>

                <div class="old-price">

                    ₹<span id="oldPrice"></span>

                </div>

                <div class="discount-tag">

                    <span id="discount"></span>% OFF

                </div>

                <div class="saving">

                    You Save ₹<span id="saving"></span>

                </div>

            </div>

            <div class="stock">

                <i class="fa-solid fa-circle-check"></i>

                <span id="stock"></span>

            </div>

            <div class="delivery">

                <i class="fa-solid fa-truck-fast"></i> Free Delivery

            </div>
            <hr>

            <h3>Select Color</h3>

            <div class="color-options">

                <button class="color active" data-color="Black" style="background:black;"></button>

                <button class="color" data-color="Blue" style="background:#2563eb;"></button>

                <button class="color" data-color="Red" style="background:#ef4444;"></button>

            </div>

            <hr>

            <h3>Select Size</h3>

            <div class="size-options">

                <button class="size active">

        S

    </button>

                <button class="size">

        M

    </button>

                <button class="size">

        L

    </button>

                <button class="size">

        XL

    </button>

            </div>

            <div class="replace">

                <i class="fa-solid fa-rotate-left"></i> 7 Days Replacement

            </div>

            <hr>

            <h3>Description</h3>

            <p id="description"></p>

            <hr>

            <h3>Quantity</h3>

            <div class="quantity-box">

                <button id="minusBtn">

                -

            </button>

                <input id="quantity" type="text" value="1" readonly>


                <button id="plusBtn">

                +

            </button>

            </div>

            <div class="action-buttons">

                <button id="addCartBtn" class="cart-btn">

                <i class="fa-solid fa-cart-shopping"></i>

                Add To Cart

            </button>

                <button id="wishlistBtn" class="wish-btn">

                <i class="fa-solid fa-heart"></i>

                Wishlist

            </button>

                <button id="buyNowBtn" class="buy-btn">
                    <i class="fa-solid fa-bolt"></i>
                        Buy Now
                </button>

            </div>

        </div>

    </section>
    <!--=========================================
        PRODUCT INFORMATION
==========================================-->

    <section class="product-extra">

        <!-- Specifications -->

        <div class="specifications">

            <h2>Specifications</h2>

            <table>

                <tr>

                    <th>Brand</th>

                    <td id="brand"></td>

                </tr>

                <tr>

                    <th>Category</th>

                    <td id="specCategory"></td>

                </tr>

                <tr>

                    <th>Stock</th>

                    <td id="specStock"></td>

                </tr>

                <tr>

                    <th>Rating</th>

                    <td id="specRating"></td>

                </tr>

            </table>

        </div>

        <!-- Delivery -->

        <div class="delivery-box">

            <h2>Delivery Availability</h2>

            <div class="delivery-check">

                <input type="text" id="pincode" placeholder="Enter Pincode">

                <button id="checkDelivery">

                Check

            </button>

            </div>

            <p id="deliveryResult"></p>

        </div>

    </section>

    <!--=========================================
        CUSTOMER REVIEWS
==========================================-->

    <section class="reviews">

        <h2>Customer Reviews</h2>

        <div id="reviewContainer">

        </div>

    </section>

    <!--=========================================
        RELATED PRODUCTS
==========================================-->

    <section class="related-products">

        <h2>You May Also Like</h2>

        <div id="relatedGrid">

        </div>

    </section>
    <script src="js/app.js"></script>

    <script src="js/product-details.js"></script>

</body>

</html>
